services:
  - type: web
    name: nexus-api
    env: node
    region: oregon
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false   # Set in Render dashboard
      - key: JWT_SECRET
        sync: false   # Set in Render dashboard
      - key: JWT_EXPIRE
        value: 7d
      - key: CLIENT_URL
        sync: false   # e.g. https://nexus.vercel.app

  - type: static_site
    name: nexus-client
    region: oregon
    buildCommand: cd client && npm install && npm run build
    publishPath: client/dist
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        sync: false   # Set in Render dashboard to the API URL (e.g. https://nexus-api.onrender.com/api)
